<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengumuman - SDA Music Course</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #4A90E2;
            --accent-pink: #FF6B6B;
            --accent-yellow: #FFD93D;
            --text-dark: #2C3E50;
            --white: #ffffff;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #FDFBF7;
            margin: 0;
            padding: 40px 10%;
            color: var(--text-dark);
            line-height: 1.6;
        }

        h1 { font-family: 'Fredoka One', cursive; color: var(--primary-blue); text-align: center; font-size: 42px; text-shadow: 3px 3px 0px var(--white); }

        .back-home { display: block; text-align: center; margin-bottom: 30px; text-decoration: none; font-weight: 700; color: var(--primary-blue); }

        .announcement-container { max-width: 850px; margin: 0 auto; }

        .post {
            background: white;
            padding: 40px;
            border-radius: 30px;
            border: 4px solid var(--text-dark);
            margin-bottom: 30px;
            box-shadow: 10px 10px 0px var(--accent-yellow);
            position: relative;
        }

        .post-date {
            font-weight: 800;
            color: var(--accent-pink);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            display: block;
        }

        .post-title {
            font-family: 'Fredoka One', cursive;
            margin: 0 0 20px 0;
            color: var(--primary-blue);
            font-size: 28px;
            line-height: 1.2;
        }

        .post-content { font-size: 16px; color: #444; font-weight: 500; }

        .pagination { display: flex; justify-content: center; gap: 20px; margin-top: 50px; }

        .nav-btn {
            background: var(--primary-blue);
            color: white;
            border: 4px solid var(--text-dark);
            padding: 12px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Fredoka One', cursive;
            font-size: 16px;
            box-shadow: 4px 4px 0px var(--text-dark);
            transition: 0.2s;
        }

        .nav-btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px var(--text-dark); }
        .nav-btn:disabled { background: #ccc; cursor: not-allowed; box-shadow: none; transform: none; }

        @media (max-width: 768px) {
            body { padding: 20px 5%; }
            .post { padding: 25px; }
            .post-title { font-size: 22px; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-home">← KEMBALI KE BERANDA</a>
    <h1>PENGUMUMAN TERBARU 📢</h1>

    <div id="announcement-list" class="announcement-container">
        <p style="text-align: center; font-weight: 700;">Sedang menyetel alat musik... 🎸</p>
    </div>

    <div class="pagination">
        <button id="prevBtn" class="nav-btn" onclick="changePage(-1)">SEBELUMNYA</button>
        <button id="nextBtn" class="nav-btn" onclick="changePage(1)">SELANJUTNYA</button>
    </div>

    <script>
        // LINK CSV GOOGLE SHEETS KAMU LUR
        const spreadsheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSJp2RZUbJ5DYvRkQIUlMgia__-rqzJ561BQXPvB-U60-zYYv__K7AqCxSos--n3qBWFydp8wtmgbeK/pub?output=csv';
        
        let allData = [];
        let currentPage = 1;
        const limit = 5;

        // Logika sakti untuk memisahkan kolom CSV yang mengandung koma atau tanda kutip
        function csvToArray(text) {
            const p = /^\s*(?:'[^'\\]*(?:\\[\S\s][^'\\]*)*'|"[^"\\]*(?:\\[\S\s][^"\\]*)*"|[^,'\s\\]*(?:\s+[^,'\s\\]+)*)\s*(?:,\s*(?:'[^'\\]*(?:\\[\S\s][^'\\]*)*'|"[^"\\]*(?:\\[\S\s][^"\\]*)*"|[^,'\s\\]*(?:\s+[^,'\s\\]+)*)\s*)*$/;
            const rows = text.split(/\r?\n/);
            return rows.map(row => {
                const parts = [];
                let part = '';
                let inQuotes = false;
                for (let char of row) {
                    if (char === '"') inQuotes = !inQuotes;
                    else if (char === ',' && !inQuotes) {
                        parts.push(part.trim().replace(/^"|"$/g, ''));
                        part = '';
                    } else part += char;
                }
                parts.push(part.trim().replace(/^"|"$/g, ''));
                return parts;
            });
        }

        // FUNGSI SAKTI: Otomatis mendeteksi pola [Teks: Link] dari Google Sheets dan mengubahnya jadi HTML Link
        function parseTextToHtmlLinks(text) {
            if (!text) return "";
            
            // Regex ini akan mencari pola teks di dalam kurung siku yang dipisah tanda titik dua, contoh -> [Klik Sini: http://...]
            return text.replace(/\[([^\]\:]+)\:\s*(https?:\/\/[^\s\]]+)\]/g, function(match, label, url) {
                return `<a href="${url}" style="color: var(--primary-blue); text-decoration: underline; font-weight: bold;" target="_blank">${label}</a>`;
            });
        }

        async function fetchData() {
            try {
                const response = await fetch(spreadsheetUrl);
                if (!response.ok) throw new Error('Network error');
                const text = await response.text();
                
                const dataArray = csvToArray(text);
                const contentRows = dataArray.slice(1); // Buang header

                allData = contentRows
                    .filter(cols => cols.length >= 3 && cols[1] !== "")
                    .map(cols => ({
                        tanggal: cols[0],
                        judul: cols[1],
                        isi: cols[2]
                    }))
                    .reverse(); // Yang terbaru di atas

                renderPage();
            } catch (error) {
                console.error(error);
                document.getElementById('announcement-list').innerHTML = 
                    "<div class='post'><p style='text-align:center;'>Waduh Lur, datanya gagal dimuat. Cek koneksi atau link CSV kamu ya!</p></div>";
            }
        }

        function renderPage() {
            const list = document.getElementById('announcement-list');
            list.innerHTML = "";
            
            const start = (currentPage - 1) * limit;
            const end = start + limit;
            const pageData = allData.slice(start, end);

            if (pageData.length === 0) {
                list.innerHTML = "<div class='post'><h2 style='text-align:center;'>Belum ada kabar baru hari ini, Lur! ☕</h2></div>";
                return;
            }

            pageData.forEach(item => {
                // Proses isi dari Google Sheet lewat fungsi pencari link otomatis sebelum ditampilkan
                const kontenTerfilter = parseTextToHtmlLinks(item.isi);

                list.innerHTML += `
                    <div class="post">
                        <span class="post-date">${item.tanggal}</span>
                        <h2 class="post-title">${item.judul}</h2>
                        <div class="post-content">${kontenTerfilter}</div>
                    </div>
                `;
            });

            document.getElementById('prevBtn').disabled = currentPage === 1;
            document.getElementById('nextBtn').disabled = end >= allData.length;
        }

        function changePage(direction) {
            currentPage += direction;
            renderPage();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        fetchData();
    </script>
</body>
</html>
